<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Expense Tracker · Kierce Nguyen</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --navy: #0D1B2A; --navy2: #112236; --navy3: #1A2F47;
  --amber: #F4A261; --amber2: #E07B39;
  --white: #F0F4F8; --muted: #8BA3BA; --card: #162337;
  --green: #52C97A; --red: #E05252;
}
body { background: var(--navy); color: var(--white); font-family: 'Inter', sans-serif; min-height: 100vh; }

nav {
  display: flex; align-items: center; gap: 1rem;
  padding: 1.1rem 6%;
  background: rgba(13,27,42,0.9);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(244,162,97,0.08);
}
.back-link {
  text-decoration: none; color: var(--muted); font-size: 0.85rem;
  display: flex; align-items: center; gap: 0.4rem;
  transition: color 0.2s;
}
.back-link:hover { color: var(--amber); }
.nav-sep { color: var(--navy3); }
.nav-title { font-family: 'Sora', sans-serif; font-size: 0.95rem; font-weight: 600; color: var(--white); }

main { max-width: 760px; margin: 0 auto; padding: 3rem 6% 5rem; }
.page-eyebrow {
  font-size: 0.78rem; font-weight: 600; letter-spacing: 0.2em;
  text-transform: uppercase; color: var(--amber); margin-bottom: 0.5rem;
}
h1 { font-family: 'Sora', sans-serif; font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
.page-sub { color: var(--muted); font-size: 0.92rem; margin-bottom: 2.5rem; }
.tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 2.5rem; }
.tag {
  font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em;
  padding: 0.22rem 0.6rem; border-radius: 4px;
  background: rgba(244,162,97,0.12); color: var(--amber); text-transform: uppercase;
}

/* Summary bar */
.summary-bar {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 1rem; margin-bottom: 1.5rem;
}
.summary-card {
  background: var(--card);
  border: 1px solid rgba(244,162,97,0.12);
  border-radius: 10px;
  padding: 1.2rem 1.4rem;
  text-align: center;
}
.summary-label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.4rem; }
.summary-value { font-family: 'Sora', sans-serif; font-size: 1.4rem; font-weight: 700; }
.summary-value.income { color: var(--green); }
.summary-value.expense { color: var(--red); }
.summary-value.balance { color: var(--amber); }

.app-card {
  background: var(--card);
  border: 1px solid rgba(244,162,97,0.12);
  border-radius: 12px;
  padding: 2rem;
}

.form-row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
input[type="text"], input[type="number"], select {
  flex: 1; min-width: 130px;
  background: var(--navy3);
  border: 1px solid rgba(244,162,97,0.15);
  border-radius: 6px;
  padding: 0.6rem 0.9rem;
  color: var(--white);
  font-family: 'Inter', sans-serif;
  font-size: 0.88rem;
  outline: none;
  transition: border-color 0.2s;
}
select option { background: var(--navy3); }
input::placeholder { color: var(--muted); }
input:focus, select:focus { border-color: var(--amber); }

.btn-row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
button {
  padding: 0.6rem 1.3rem;
  border-radius: 6px;
  font-family: 'Inter', sans-serif; font-size: 0.88rem; font-weight: 600;
  cursor: pointer; border: none; transition: all 0.2s;
}
.btn-add-income { background: rgba(82,201,122,0.15); color: var(--green); border: 1.5px solid rgba(82,201,122,0.3); }
.btn-add-income:hover { background: rgba(82,201,122,0.25); }
.btn-add-expense { background: rgba(224,82,82,0.15); color: var(--red); border: 1.5px solid rgba(224,82,82,0.3); }
.btn-add-expense:hover { background: rgba(224,82,82,0.25); }
.btn-clear-all { background: transparent; color: var(--muted); border: 1.5px solid rgba(240,244,248,0.1); }
.btn-clear-all:hover { border-color: var(--red); color: var(--red); }

.divider { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 1.5rem 0; }
.status-msg { font-size: 0.82rem; color: var(--amber); min-height: 1.2rem; margin-bottom: 0.75rem; }

.filter-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
.filter-btn {
  padding: 0.3rem 0.85rem; border-radius: 20px; font-size: 0.78rem; font-weight: 600;
  cursor: pointer; border: 1.5px solid rgba(240,244,248,0.12);
  background: transparent; color: var(--muted); transition: all 0.2s;
}
.filter-btn.active { background: rgba(244,162,97,0.15); color: var(--amber); border-color: rgba(244,162,97,0.4); }

#tx-list { display: flex; flex-direction: column; gap: 0.6rem; }
.tx-item {
  display: flex; align-items: center; gap: 0.8rem;
  background: var(--navy3); border: 1px solid rgba(244,162,97,0.07);
  border-radius: 8px; padding: 0.75rem 1rem;
  animation: slideIn 0.2s ease;
}
@keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
.tx-icon {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.85rem; flex-shrink: 0;
}
.tx-icon.income { background: rgba(82,201,122,0.15); color: var(--green); }
.tx-icon.expense { background: rgba(224,82,82,0.15); color: var(--red); }
.tx-info { flex: 1; min-width: 0; }
.tx-desc { font-weight: 500; font-size: 0.9rem; }
.tx-meta { font-size: 0.78rem; color: var(--muted); }
.tx-amount { font-family: 'Sora', sans-serif; font-weight: 700; font-size: 0.95rem; flex-shrink: 0; }
.tx-amount.income { color: var(--green); }
.tx-amount.expense { color: var(--red); }
.tx-delete {
  background: none; border: none; cursor: pointer;
  color: var(--muted); font-size: 0.9rem; padding: 0.2rem 0.4rem;
  border-radius: 4px; transition: color 0.2s, background 0.2s;
}
.tx-delete:hover { color: var(--red); background: rgba(224,82,82,0.1); }
.empty-state { text-align: center; color: var(--muted); font-size: 0.88rem; padding: 2rem 0; }
</style>
</head>
<body>
<nav>
  <a class="back-link" href="index.html">← Back</a>
  <span class="nav-sep">/</span>
  <span class="nav-title">💸 Expense Tracker</span>
</nav>

<main>
  <p class="page-eyebrow">Demo · Python → Browser</p>
  <h1>Expense Tracker</h1>
  <p class="page-sub">An in-browser recreation of the Python CLI project. Add income and expenses, track your balance — data lives in your session.</p>
  <div class="tags">
    <span class="tag">Python</span>
    <span class="tag">File I/O</span>
    <span class="tag">CLI</span>
  </div>

  <div class="summary-bar">
    <div class="summary-card">
      <div class="summary-label">Balance</div>
      <div class="summary-value balance" id="bal">$0.00</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Income</div>
      <div class="summary-value income" id="tot-income">$0.00</div>
    </div>
    <div class="summary-card">
      <div class="summary-label">Expenses</div>
      <div class="summary-value expense" id="tot-expense">$0.00</div>
    </div>
  </div>

  <div class="app-card">
    <div class="form-row">
      <input type="text" id="inp-desc" placeholder="Description (e.g. Salary, Rent)" />
      <input type="number" id="inp-amount" placeholder="Amount" min="0" step="0.01" />
      <select id="inp-category">
        <option value="General">General</option>
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Housing">Housing</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Income">Income</option>
        <option value="Other">Other</option>
      </select>
    </div>
    <div class="btn-row">
      <button class="btn-add-income" onclick="addTx('income')">+ Add Income</button>
      <button class="btn-add-expense" onclick="addTx('expense')">− Add Expense</button>
      <button class="btn-clear-all" onclick="clearAll()">Clear All</button>
    </div>
    <p class="status-msg" id="status"></p>

    <hr class="divider" />

    <div class="filter-row">
      <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
      <button class="filter-btn" onclick="setFilter('income', this)">Income</button>
      <button class="filter-btn" onclick="setFilter('expense', this)">Expenses</button>
    </div>

    <div id="tx-list"></div>
  </div>
</main>

<script>
let transactions = [];
let currentFilter = 'all';

const ICONS = { income: '↑', expense: '↓' };

function fmt(n) {
  return '$' + Math.abs(n).toFixed(2);
}

function setStatus(msg, isError = false) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.color = isError ? '#E05252' : 'var(--amber)';
  setTimeout(() => { el.textContent = ''; }, 2500);
}

function addTx(type) {
  const desc = document.getElementById('inp-desc').value.trim();
  const amount = parseFloat(document.getElementById('inp-amount').value);
  const category = document.getElementById('inp-category').value;

  if (!desc) { setStatus('Please enter a description.', true); return; }
  if (isNaN(amount) || amount <= 0) { setStatus('Please enter a valid amount.', true); return; }

  transactions.unshift({ id: Date.now(), type, desc, amount, category, date: new Date().toLocaleDateString() });
  document.getElementById('inp-desc').value = '';
  document.getElementById('inp-amount').value = '';
  setStatus(`✓ Added ${type}: ${desc} — ${fmt(amount)}`);
  render();
}

function deleteTx(id) {
  const t = transactions.find(t => t.id === id);
  transactions = transactions.filter(t => t.id !== id);
  if (t) setStatus(`Removed: ${t.desc}`);
  render();
}

function clearAll() {
  if (transactions.length === 0) return;
  transactions = [];
  setStatus('Cleared all transactions.');
  render();
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  const income = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
  const expense = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
  document.getElementById('bal').textContent = '$' + (income - expense).toFixed(2);
  document.getElementById('tot-income').textContent = fmt(income);
  document.getElementById('tot-expense').textContent = fmt(expense);

  const filtered = currentFilter === 'all' ? transactions : transactions.filter(t => t.type === currentFilter);
  const list = document.getElementById('tx-list');

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state">${transactions.length === 0 ? 'No transactions yet. Add one above.' : 'No ' + currentFilter + ' transactions.'}</div>`;
    return;
  }

  list.innerHTML = filtered.map(t => `
    <div class="tx-item">
      <div class="tx-icon ${t.type}">${ICONS[t.type]}</div>
      <div class="tx-info">
        <div class="tx-desc">${t.desc}</div>
        <div class="tx-meta">${t.category} · ${t.date}</div>
      </div>
      <div class="tx-amount ${t.type}">${t.type === 'income' ? '+' : '−'}${fmt(t.amount)}</div>
      <button class="tx-delete" onclick="deleteTx(${t.id})" title="Delete">✕</button>
    </div>
  `).join('');
}

// Enter key support
['inp-desc', 'inp-amount'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') addTx('expense');
  });
});

render();
</script>
</body>
</html>
