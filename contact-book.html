<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Book · Kierce Nguyen</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #0D1B2A; --navy2: #112236; --navy3: #1A2F47;
      --amber: #F4A261; --amber2: #E07B39;
      --white: #F0F4F8; --muted: #8BA3BA; --card: #162337;
      --red: #E05252;
    }
    body { background: var(--navy); color: var(--white); font-family: 'Inter', sans-serif; min-height: 100vh; }

    /* ── NAV ── */
    nav {
      display: flex; align-items: center; gap: 1rem;
      padding: 1.1rem 6%;
      background: rgba(13,27,42,0.9);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(244,162,97,0.08);
    }
    .back-link {
      text-decoration: none; color: var(--muted); font-size: 0.85rem;
      display: flex; align-items: center; gap: 0.4rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--amber); }
    .nav-sep { color: var(--navy3); }
    .nav-title { font-family: 'Sora', sans-serif; font-size: 0.95rem; font-weight: 600; color: var(--white); }

    /* ── LAYOUT ── */
    main { max-width: 760px; margin: 0 auto; padding: 3rem 6% 5rem; }
    .page-eyebrow {
      font-size: 0.78rem; font-weight: 600; letter-spacing: 0.2em;
      text-transform: uppercase; color: var(--amber); margin-bottom: 0.5rem;
    }
    h1 { font-family: 'Sora', sans-serif; font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
    .page-sub { color: var(--muted); font-size: 0.92rem; margin-bottom: 2.5rem; }

    .tags { display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 2.5rem; }
    .tag {
      font-size: 0.72rem; font-weight: 600; letter-spacing: 0.06em;
      padding: 0.22rem 0.6rem; border-radius: 4px;
      background: rgba(244,162,97,0.12); color: var(--amber); text-transform: uppercase;
    }

    /* ── APP ── */
    .app-card {
      background: var(--card);
      border: 1px solid rgba(244,162,97,0.12);
      border-radius: 12px;
      padding: 2rem;
    }

    .input-row { display: flex; gap: 0.75rem; margin-bottom: 0.75rem; flex-wrap: wrap; }
    input[type="text"] {
      flex: 1; min-width: 140px;
      background: var(--navy3);
      border: 1px solid rgba(244,162,97,0.15);
      border-radius: 6px;
      padding: 0.6rem 0.9rem;
      color: var(--white);
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]::placeholder { color: var(--muted); }
    input[type="text"]:focus { border-color: var(--amber); }

    .btn-row { display: flex; gap: 0.75rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
    button {
      padding: 0.6rem 1.3rem;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-add { background: var(--amber); color: var(--navy); }
    .btn-add:hover { background: var(--amber2); }
    .btn-search { background: transparent; color: var(--white); border: 1.5px solid rgba(240,244,248,0.2); }
    .btn-search:hover { border-color: var(--amber); color: var(--amber); }
    .btn-clear { background: transparent; color: var(--muted); border: 1.5px solid rgba(240,244,248,0.1); }
    .btn-clear:hover { border-color: var(--red); color: var(--red); }

    .divider { border: none; border-top: 1px solid rgba(255,255,255,0.06); margin: 1.5rem 0; }

    .search-row { display: flex; gap: 0.75rem; margin-bottom: 1.5rem; }
    .search-row input { flex: 1; }

    /* ── CONTACT LIST ── */
    #contact-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .contact-item {
      display: flex; align-items: center; gap: 1rem;
      background: var(--navy3);
      border: 1px solid rgba(244,162,97,0.08);
      border-radius: 8px;
      padding: 0.8rem 1rem;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .contact-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(244,162,97,0.15);
      color: var(--amber);
      font-family: 'Sora', sans-serif;
      font-weight: 700; font-size: 0.85rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .contact-info { flex: 1; min-width: 0; }
    .contact-name { font-weight: 600; font-size: 0.92rem; }
    .contact-details { font-size: 0.8rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .contact-delete {
      background: none; border: none; cursor: pointer;
      color: var(--muted); font-size: 1rem; padding: 0.2rem 0.4rem;
      border-radius: 4px; transition: color 0.2s, background 0.2s;
    }
    .contact-delete:hover { color: var(--red); background: rgba(224,82,82,0.1); }

    .empty-state {
      text-align: center; color: var(--muted);
      font-size: 0.88rem; padding: 2rem 0;
    }
    .status-msg {
      font-size: 0.82rem; color: var(--amber);
      min-height: 1.2rem; margin-bottom: 0.5rem;
    }
  </style>
</head>
<body>

  <nav>
    <a class="back-link" href="../index.html">← Back</a>
    <span class="nav-sep">/</span>
    <span class="nav-title">📒 Contact Book</span>
  </nav>

  <main>
    <p class="page-eyebrow">Demo · Python → Browser</p>
    <h1>Contact Book</h1>
    <p class="page-sub">An in-browser recreation of the Python CLI project. Add, search, and delete contacts — data lives in your session.</p>
    <div class="tags">
      <span class="tag">Python</span>
      <span class="tag">File I/O</span>
      <span class="tag">CLI</span>
    </div>

    <div class="app-card">
      <!-- Add form -->
      <div class="input-row">
        <input type="text" id="inp-name"  placeholder="Name" />
        <input type="text" id="inp-phone" placeholder="Phone" />
        <input type="text" id="inp-email" placeholder="Email" />
      </div>
      <div class="btn-row">
        <button class="btn-add" onclick="addContact()">+ Add Contact</button>
      </div>

      <p class="status-msg" id="status"></p>

      <hr class="divider" />

      <!-- Search -->
      <div class="search-row">
        <input type="text" id="inp-search" placeholder="Search by name…" oninput="renderList()" />
        <button class="btn-clear" onclick="clearSearch()">Clear</button>
      </div>

      <!-- List -->
      <div id="contact-list"></div>
    </div>
  </main>

  <script>
    let contacts = [];

    function initials(name) {
      return name.trim().split(/\s+/).map(w => w[0].toUpperCase()).slice(0,2).join('');
    }

    function setStatus(msg, isError = false) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.style.color = isError ? '#E05252' : 'var(--amber)';
      setTimeout(() => { el.textContent = ''; }, 2500);
    }

    function addContact() {
      const name  = document.getElementById('inp-name').value.trim();
      const phone = document.getElementById('inp-phone').value.trim();
      const email = document.getElementById('inp-email').value.trim();
      if (!name) { setStatus('Name is required.', true); return; }
      contacts.push({ id: Date.now(), name, phone, email });
      document.getElementById('inp-name').value  = '';
      document.getElementById('inp-phone').value = '';
      document.getElementById('inp-email').value = '';
      setStatus(`✓ Added ${name}`);
      renderList();
    }

    function deleteContact(id) {
      const c = contacts.find(c => c.id === id);
      contacts = contacts.filter(c => c.id !== id);
      if (c) setStatus(`Removed ${c.name}`);
      renderList();
    }

    function clearSearch() {
      document.getElementById('inp-search').value = '';
      renderList();
    }

    function renderList() {
      const q = document.getElementById('inp-search').value.trim().toLowerCase();
      const filtered = q ? contacts.filter(c => c.name.toLowerCase().includes(q)) : contacts;
      const list = document.getElementById('contact-list');

      if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-state">${contacts.length === 0 ? 'No contacts yet. Add one above.' : 'No results for "' + q + '"'}</div>`;
        return;
      }

      list.innerHTML = filtered.map(c => `
        <div class="contact-item">
          <div class="contact-avatar">${initials(c.name)}</div>
          <div class="contact-info">
            <div class="contact-name">${c.name}</div>
            <div class="contact-details">${[c.phone, c.email].filter(Boolean).join(' · ') || 'No details'}</div>
          </div>
          <button class="contact-delete" onclick="deleteContact(${c.id})" title="Delete">✕</button>
        </div>
      `).join('');
    }

    // Init
    renderList();

    // Allow Enter key on inputs to add
    ['inp-name','inp-phone','inp-email'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') addContact();
      });
    });
  </script>

</body>
</html>
